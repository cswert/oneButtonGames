A series of simple games that only need one button
Last Modified Aug 25
Use "npm i -g http-server" and "http-server" for codespace port

<meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0, user-scalable=no">
<head>
	<style>
	:root{
		--char: "🐸";
		--bc: rgb(40,40,40);
		--fc: rgb(200,200,200);
		font-size: 8px;
	}
	body{
		background: var(--bc);
		color: var(--fc);
		text-align: center;
		font-size: 3rem;
	}
	.head{
		font-size: 5rem;
	}
	select{
		background: var(--bc);
		color: var(--fc);
		font-size: inherit;
		border-radius: 10px;
	}
	option{
		background: var(--bc);
		color: var(--fc);
	}
	input[type="number" i] {
	   border-radius: 10px;
	   background: bottom;
	   text-align: center;
	   color: rgb(200,200,200);
	   font-size: smaller;
	}
	.game {
		position: relative;
		justify-self: center;
		border: solid;
	   	border-radius: 10px;
		font-size: 5rem;
		overflow: hidden;
	}
	.overlay {
		position: absolute;
		z-index: 1001;
	}
	canvas {
		border: solid;
	   	border-radius: 10px;
	}
	table {
		margin: auto;
		text-wrap-mode: nowrap;
		font-size: 2rem;
		text-align: center;
		max-width: 85%;
	}
	td {
		width: 1%;
	}
	.btn{
		background: none;
		color: rgb(200,200,200);
		font-size: inherit;
		border-radius: 10px;
	}
	.btn:hover{
		background: rgb(200,200,200);
		color: rgb(40,40,40);
	}
	.hand{
		border-style: groove;
		display: inline-flex;
	}
	.alive{
		width: 25px;
	   height: 25px;
	   background-color: green;
	}
	.dead{
		width: 25px;
	   height: 25px;
	   background-color: red;
	}
	.char{
		background-image: none;
	}
	.char::before{
		content: var(--char);
	}
	.opts {
		height: 3.1rem;
		width: 10rem;
		overflow: hidden;
		z-index: 1;
		position:absolute;
		justify-self: center;
		border: solid;
	   	border-radius: 10px;
	}
	.opts:hover {
		height: auto;
		width: auto;
		background: var(--bc);
		z-index: 1000;
		position:absolute;
		justify-self: center;
		border: solid;
	   	border-radius: 10px;
		padding: 4rem;
		padding-top: 0;
	}

</head>

		}

		if (players[p].pressed === 0) players[p].pressed = 1;
	});

		window[gamemode]();

	async function kahoot() {
		let colours = ["black","red","blue","darkgoldenrod","green","purple","fuchsia"];
		let shapes = ["E","▲","⯁","⬤","◼","⬟","⬢"];
		if (gameState == 0) {
			temp = [];
			let [temp2] = await window.showOpenFilePicker();
			temp2 = await temp2.getFile()
			const reader = new FileReader();
			reader.readAsText(temp2);
			reader.onload = function(e) {
				temp2 = reader.result.split("\r\n");
				for (let i in temp2) {temp[i] = temp2[i].split("|");}
			}
			gameState = 1;
		}
		if (gameState == 1) {
			console.log("no questions found")
			if (temp.length < 1) return;
			console.clear();
			gameState = 2;
			timeLimit = currTime + 10000;
		}
		if (gameState == 2) {
			gZone.innerHTML = temp[0][0] + "<br>Time remaining: " + Math.round(timeLimit-currTime);

				temp2 += "<div class=kaque style='background-color:";
				temp2 += `${colours[i]}'>${shapes[i]}&nbsp${temp[0][i]}</div>`
			}
			temp2 += "</div>"
			gZone.innerHTML += temp2;
			for (let p of players) {
				if (p.pressed == currTime) p.status++;
				if (p.status > temp[0].length-2 || p.status == 0) p.status = 1;
			}
			sZone.innerHTML = "<br>" + displayPlayersTable('status');
			temp2 = document.querySelectorAll("td");
			for (let i in players) {temp2[i].innerHTML = `Player ${p.id}: ${shapes[p.status]}`;}
			if (currTime > timeLimit) {
				gameState = 3;
				timeLimit = currTime + 5000;
				sZone.style.height = "60%";
			}
		}
		if (gameState == 3) {
			if (currTime > timeLimit) {
				console.log(temp[0]);
				temp.shift();
				gameState = (temp.length > 0) ? 2 : 4;
				timeLimit = currTime + 10000;
				sZone.style.height = "";
			}
			if (timeLimit != currTime + 5000) return;
			gZone.innerHTML = temp[0][0] + "<br>The answer was: ";
			let randy = Math.floor((Math.random()*temp[0].length))-1;
			gZone.innerHTML += (rando.checked) ? temp[0][randy] : temp[0][temp[0].at(-1)];
			sZone.innerHTML = "";
			let temp2 = [0,0,0,0,0,0];
			for (let p of players) {
				temp2[p.status]++;
				if (rando.checked) {
					if (p.status == randy) p.score++;
				}
				else {
					if (p.status == temp[0].at(-1)) p.score++;
				}
				p.status = 1;
			}
			let temp3 = `<div style='display:flex; height:50%; justify-content: center; align-items: 
				flex-end;'>`;
			let sum = 0;
			temp2.forEach( num => {sum += num;});
			for (let i in temp2) {
				if (temp2[i] == 0) continue;
				temp3 += `<div style='width: 20%; background-color:${colours[i]}; `;
				temp3 += `height:${Math.round(temp2[i]/sum*100)}%'>${Math.round(temp2[i]/sum*100)}%`;
				temp3 += `<br>${temp[0][i]}</div>`;
			}
			temp3 += "</div>";
			sZone.innerHTML = temp3;
		}
		if (gameState == 4) {
			gZone.innerHTML = "That concludes the questionaire.<br>" + displayPlayersTable('score');
			sZone.innerHTML = "";
			gameState = 5;
		}
	}

	function langtonSnake() {
		//a combination of langton's ant, and snake to each other, ends with 1 player left... this game sucks
		let temp2 = ["▲","►","▼","◄","X"];
		if (gameState == 0) {
			gameState = 1;
			timeLimit = currTime + 5000;
			startTime = currTime;
			temp = [];
			for (let i = 0; i < 31; i++) {temp.push(new Array(51).fill(""));}
			sZone.innerHTML = r2t2(temp);
			document.querySelectorAll("table")[0].id = "ttt";
			ttt.style.borderCollapse = "collapse";
			temp = document.querySelectorAll("td");
			for (let i = 0; i < temp.length; i++) {
				temp[i].style.border = "1px solid green";
				temp[i].style.width = "1.2rem";
				temp[i].style.height = "1.2rem";
				temp[i].style.fontSize = "1rem";
				temp[i].style.mixBlendMode = "difference";
			}
			temp = [Math.round(Math.random()*30),Math.round(Math.random()*50)];
			ttt.rows[temp[0]].cells[temp[1]].innerHTML = "&#127822";
			for (let p of players) {
				p.score = [Math.round(Math.random()*3),Math.round(Math.random()*30),Math.round(Math.random()*50)];
				p.history = [(rando.checked) ? (Math.random()*15)+3 : 7,[p.score[1],p.score[2]]];
				ttt.rows[p.score[1]].cells[p.score[2]].innerHTML = temp2[p.score[0]];
				ttt.rows[p.score[1]].cells[p.score[2]].style.background = p.colour;
			}
		}
		if (gameState == 1) {
			gZone.innerHTML = `Next move in ${Math.round(timeLimit - currTime)}`;
			if (timeLimit < currTime) {
				if (currTime > startTime + 30000) timeLimit = currTime + ((rando.checked) ? Math.random()*1000 : 500);
				else timeLimit = currTime + ((rando.checked) ? Math.random()*1500 : 1500);
				document.querySelectorAll("td").forEach(td => td.innerHTML = "");
				for (let p of players) {
					if (p.status != "DEAD") {
						if (p.score[0] == 0 || p.score[0] == 2) {
							p.score[0] = (p.pressed != 0) ? 3 : 1;
							p.score[1] += (p.pressed != 0) ? 1 : -1;
						}
						else {
							p.score[0] = (p.pressed != 0) ? 2 : 0;
							p.score[2] += (p.pressed != 0) ? 1 : -1;
						}
						if (p.score[1] < 0) p.score[1] = 30;
						if (p.score[1] > 30) p.score[1] = 0;
						if (p.score[2] < 0) p.score[2] = 50;
						if (p.score[2] > 50) p.score[2] = 0;
						p.history.push([p.score[1],p.score[2]]);
					}
					ttt.rows[p.score[1]].cells[p.score[2]].innerHTML = temp2[p.score[0]];
					if (p.history.length > p.history[0]+1) {
						ttt.rows[p.history[1][0]].cells[p.history[1][1]].style.background = "";
						p.history.splice(1,1);
					}
					if (ttt.rows[p.score[1]].cells[p.score[2]].style.background != "") {
						p.status = "DEAD";
						p.score[0] = 4;
					}
					else ttt.rows[p.score[1]].cells[p.score[2]].style.background = p.colour;
					if (p.score[1] == temp[0] && p.score[2] == temp[1]) {
						p.history[0] += (rando.checked) ? (Math.random()*5)-3 : 1;
						let temp3 = true;
						while (temp3) {
							temp = [Math.round(Math.random()*30),Math.round(Math.random()*50)];
							if (ttt.rows[temp[0]].cells[temp[1]].style.background == "") temp3 = false;
						}
					}
				}
				if (rando.cheked) {
					let temp3 = true;
					while (temp3) {
						temp = [Math.round(Math.random()*30),Math.round(Math.random()*50)];
						if (ttt.rows[temp[0]].cells[temp[1]].style.background == "") temp3 = false;
					}
				}
				ttt.rows[temp[0]].cells[temp[1]].innerHTML = "&#127822";
				let temp3 = (players.filter(p => p.status != 'DEAD').length > 1) ? true : false;
				gameState = (temp3) ? 1 : 2;
				if (gameState == 2) {
					for (let p of players) {
						if (p.status != "DEAD") {temp3 = p.id; break;}
					}
					gZone.innerHTML = `Player ${temp3} JUAN the game!`
				}
			}
		}
	}

	function lockPicking() {
		if (gameState == 0) {
			gameState = 1;
			sZone.style.display = "ruby";
			gZone.innerHTML = `Line up and raise the tumblers`;
			temp = [];
			let temp2 = Math.round(Math.random()*2)+3;
			for (let i = 0; i < temp2; i++) {
				temp.push([i*(100/temp2)+2*5,1,(Math.random()*4)+2,2]);
			}
			for (let p of players) {
				p.status = [1,0,0,0]
				if (rando.checked) {
					temp2 = Math.round(Math.random()*4)+1;
					temp = [];
					for (let i = 0; i < temp2; i++) {
						temp.push([i*(100/temp2)+2*5,1,(Math.random()*4)+2,(Math.random()*2)+1]);
					}
				}
				p.score = temp.map(P => [...P]);
			}
		}
		if (gameState == 1) {
			let game = "";
			for (let p of players) {
				if (p.pressed) {
					for (let j in p.score) {
						if (p.status[1] >= p.score[j][0] && p.status[1] <= p.score[j][0]+2.75) {
							p.status[2] += .1;
							if (p.status[2] > 6.75) p.status[2] = 6.75;
							if (p.status[2] < p.score[j][1]) p.score[j][1] += 0.1
						}
					}
					
				}
				else if (p.status[2] > 0) {
					p.status[2] = 0;
					if (p.status[2] < 0) p.status[2] = 0;
				}
				else {

			if (p.y > maxY-1.1*p.h && p.status == 0) {
				if (cust.value == "Colour") p.colour = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

				else if (cust.value == "Width") p.w = Math.floor(Math.random()*100)+1;
				p.status = 1;
			} else if (p.y < maxY-1.1*p.h) p.status = 0;
			if (p.dx != 0) {
				if (p.dx > 0) {p.x += 1; p.dx -= 1;}

				else if (p.x > maxX - p.w) p.x = maxX - p.w;

	}
	
	function pong() {
		if (gameState == 0) {
			options.innerHTML = `
				Ball: <input type=range id=bSp min=.05 max=.5 step=.05 value=.1>
				Player: <input type=range id=pSp min=.01 max=.1 step=.01 value=.05>
			`;
			timeLimit = currTime + 5000;
			gameState = 1;
		}
		if (gameState == 1) {
			setPlayerAngles();
			let radius = Math.min(maxX, maxY) / 2.5;
			let aliveCount = players.filter(p => p.status != "DEAD").length;
			let limit = (360 / aliveCount)*.5;
			assets = [{
				x: maxX/2, y: maxY/2, colour: "white", id: "ball",
				w: Math.min(25, 100/aliveCount), h: Math.min(25, 100/aliveCount), angle: Math.random()*360,
				speed: fps*bSp.value, text: "↓"
			}];
			for (let p of players) {
				if (p.status == "DEAD") continue;
				p.x = maxX/2 + radius * Math.cos(p.angle*Math.PI/180);
				p.y = maxY/2 + radius * Math.sin(p.angle*Math.PI/180);
				p.w = Math.min(50, 250/aliveCount);
				p.h = 10;
				p.angle0 = p.angle;
				assets.push({
					x: maxX/2 + radius * Math.cos((p.angle0-limit)*Math.PI/180),
					y: maxY/2 + radius * Math.sin((p.angle0-limit)*Math.PI/180),
					colour: "white", w: 1, h: 50, angle: p.angle0-limit, id:"wall"+p.id
				});
			}
			assets.push({});
			gameState = 1.5;
		}
		if (gameState == 1.5) {
			assets[assets.length-1] = {
				text: `Starting in ${(Math.ceil((timeLimit-currTime)/1000))}`,
				x: 0, y: maxY*.75, w:maxX, h:0, id: "win", colour: "transparent"
			};
			if (currTime > timeLimit) {
				gameState = 2;
				assets.pop();
				assets[0].text = "";
			}
		}
		if (gameState == 2) {
			let radius = Math.min(maxX, maxY) / 2.5;
			let aliveCount = players.filter(p => p.status != "DEAD").length;
			let limit = (360 / aliveCount)*.5;
			for (let p of players) {
				if (p.pressed != 0) {
					if (p.status == "DEAD") continue;
					if (p.status == 0) p.angle += fps*pSp.value*(10/aliveCount);
					else p.angle -= fps*pSp.value*(10/aliveCount);
					if (p.angle > p.angle0 + limit) {
						p.angle = p.angle0 + limit;
						p.status = 1;
					}
					else if (p.angle < p.angle0 - limit) {
						p.angle = p.angle0 - limit;
						p.status = 0;
					}
					p.angle = Math.round(p.angle*10)/10;
					p.x = maxX/2 + radius * Math.cos(p.angle*Math.PI/180);
					p.y = maxY/2 + radius * Math.sin(p.angle*Math.PI/180);
					
				}
				if (!p.collisionBuffer || p.collisionBuffer <= 0) {
					if (distanceCollide(assets[0], p)) {
						assets[0].angle = p.angle - 180 + (Math.random() * 30 - 15);
						assets[0].speed = fps*bSp.value*(Math.random()+1);
						while (assets[0].angle <= 0) assets[0].angle += 360;
						while (assets[0].angle >= 360) assets[0].angle -= 360;
						if (rando.checked) {
							assets[0].w = Math.random()*40+10;
							assets[0].h = Math.random()*40+10;
						}
						p.collisionBuffer = 20;
						playSound({frequency:685,type:"square",duration:100});
					}
				} else {
					p.collisionBuffer--;
				}
			}
			assets[0].x += assets[0].speed * Math.cos(assets[0].angle*Math.PI/180);
			assets[0].y += assets[0].speed * Math.sin(assets[0].angle*Math.PI/180);
			let distFromCenter = Math.sqrt(
				(assets[0].x + assets[0].w / 2 - maxX / 2) * (assets[0].x + assets[0].w / 2 - maxX / 2) +
				(assets[0].y + assets[0].h / 2 - maxY / 2) * (assets[0].y + assets[0].h / 2 - maxY / 2)
			);
			let ballAngle = Math.atan2(
				assets[0].y + assets[0].h / 2 - maxY / 2,
				assets[0].x + assets[0].w / 2 - maxX / 2
				) * 180 / Math.PI;
			if (ballAngle < 0) ballAngle += 360;
			if (distFromCenter > radius*1.5) {
				for (let p of players) {
					if (p.status == "DEAD") continue;
					let pmin = p.angle0 - limit;
					while (pmin < 0) pmin += 360;
					let pmax = p.angle0 + limit;
					while (pmax >= 360) pmax -= 360;
					if (pmin < pmax) {
						if (ballAngle >= pmin && ballAngle <= pmax) {
							p.score++;
							if (p.score > 0) p.status = "DEAD";
							gameState = 1;
							timeLimit = currTime + 3000;
						}
					} else {
						if (ballAngle >= pmin || ballAngle <= pmax) {
							p.score++;
							if (p.score > 0) p.status = "DEAD";
							gameState = 1;
							timeLimit = currTime + 3000;
						}
					}
				}
				if (players.filter(p => p.status != "DEAD").length < 2) {
					let winner = players.find(p => p.status != "DEAD");
					players[players.findIndex(p => p.id == winner.id)].status = "DEAD";
					assets = [{
						text: `Player ${winner.id} won!`,
						x: 0, y: maxY/2, w:maxX, h:0, id: "win", colour: "transparent"
					}];
					gameState = 3;
				}
			}
		}
	}

				p.x = 0; p.h = Math.min(50,maxY/players.length/5); p.w = p.h;
				p.status = 1;
			}
		}
		if (gameState == 1) {
			gameState = 2;
			if (currTime > timeLimit) {
				if (temp > 0) {
					temp = -currTime;
					assets[0].text = "STOP!";
					assets[0].colour = "red";
				}
				else {
					temp = currTime;
					assets[0].text = "GO!";
					assets[0].colour = "green";
				}
				timeLimit = currTime + Math.round(Math.random()*hd.value)+500;
			}
			for (let p of players){
				if (p.pressed != 0 && p.status >= 0) {
					if (temp > 0) p.score += fps/16;
					//coyote time for reaction is 150ms
					else if (p.score > 10 && (rando.checked || currTime > 150-temp)) p.status *= -1;
					p.x = p.score;
					if (p.score > maxX-p.w) {
						p.score = 0;
						p.x = 0;
						p.status++;
					}
				}
				if (p.status >= 0) gameState = 1;
			}
			if (gameState == 2) {
				assets[0].colour = "transparent";
				for (let p of players) {p.score = p.score-1*(p.status+1)*maxX}
				let winner = minMaxScore()[1];
				let highScore = Math.round(players[players.findIndex(P => P.id === winner[0])].score);
				assets[0].text = `Player${winner.length == 1 ? "" : "s"} ${winner.join(", ")} reached ${highScore} units!`;
				for (let p of players) {p.x = (p.score / highScore * maxX) - p.w;}
				gameState = 3;
			}
		}
	}

				temp = p.score.split(" ");

					let temp2 = [0,0];
					temp2[0] = Math.cos(p.score[0])*p.score[1];
					temp2[1] = Math.sin(p.score[0])*p.score[1];
					p.score = [...temp2,1,1];
				}
			}
		}
		if (gameState == 3) {
			let alivePlayers = players.filter(p => p.status >= 0);
			if (alivePlayers.length <= 0) gameState = 4;
			let maxPX = Math.max(...alivePlayers.map(p => p.score[2] + p.w + maxX*.75));
			let minX = Math.min(...alivePlayers.map(p => p.score[2] - maxX*.25));
			let scale = maxX / (maxPX - minX);
			if (alivePlayers.length == 1) scale = 1;
			if (Math.random() < fps*fq.value/15 && alivePlayers.length > 0) {
				let type = (Math.random() < .5) ? "bomb" : "spike";
				if (rando.checked) temp.push({type: type, x: maxPX + maxX*.25, y: maxY*Math.random()});
				else temp.push({type: type, x: maxPX + maxX*.25, y: 0});
				temp.at(-1).colour = (temp.at(-1).type == "spike") ? "magenta" : "red";
				temp.at(-1).w = temp.at(-1).h = (temp.at(-1).type == "spike") ? 1*ss.value : 1*bs.value;
				temp.at(-1).id = temp.length;
			}
			assets = [{text: Math.round((maxPX-maxX*.75)/10), x: 0, y: maxY, w: maxX, h: 0, id: "score", colour: "transparent"}];
			for (let t of temp) {
				let copy = {...t };
				assets.push(copy);
				assets[assets.length-1].x = (assets[assets.length-1].x - minX) * scale;
				assets[assets.length-1].w *= scale;
				assets[assets.length-1].h *= scale;
			}
			for (let p of players) {
				if (p.status == "DEAD") continue;
				if (p.score[0] >= 0.1) {
					p.score[2] += p.score[0] * (fps/17);
					p.score[3] += p.score[1] * (fps/17);
					if (p.score[3] < 0) {
						p.score[3] = 0;
						p.score[0] *= 2-1*bf.value;
						p.score[1] *= -1*bn.value;
					}
					p.score[0] *= Math.pow(.999, fps/17);
					p.score[1] -= 1*gr.value * (fps/17);
				}
				else {
					p.score[0] = 0;
					p.status = "DEAD";
				}
				p.x = (p.score[2] - minX) * scale;
				p.y = p.score[3] * scale;
				p.w = p.h = p.s * scale;
				if (p.y > maxY) {
					p.w = p.h = Math.max(p.s * (maxY / p.y), 10);
					p.y = maxY - p.h;
				}
				for (let a of assets) {
					if (a.id == "score" || p.score[3] > maxY) continue;
					if (simpleCollide(p,a)) {
						if (a.type == "spike") {
							p.status = -1;
							p.score[0] = p.score[1] = 0;
						}
						else {
							p.score[0] += 1 * st.value;
							if (p.score[1] < 1) p.score[1] *= -1;
							p.score[1] += 3 * st.value;
						}
					}
				}
			}
		}
		if (gameState == 4) {
			gameState = 5;
			assets = [];
			for (let p of players) {
				p.status = "DEAD";
				p.x = p.score[2];
				p.y = p.score[3];
				p.w = p.h = p.s;
			}
			let maxPX = Math.max(...players.map(p => p.x));
			for (let t of temp) {
				if (t.x == null || t.x > maxX*.8 + maxPX) continue;
				if (t.x + t.w > maxX + maxPX) t.w = maxX - t.x;
				assets.push(t);
			}
			maxPX = Math.max(...players.map(p => p.x + p.w + maxX*.75));
			assets.push({text: Math.round((maxPX-maxX*.75)/10), x: Math.max(...players.map(p => p.x))-maxX*.1, y: maxY, w:maxX, h:0, id: "score", colour: "transparent"});
			endDisplay();
		}
	}

						t.y += Math.round(Math.random()*50)*(Math.random() < 0.5 ? -1 : 1);
					}
					else {
						(t.x < .5*maxX) ? t.x-- :  t.x++;
						(t.y < .5*maxY) ? t.y-- : t.y++;
					}
				}
				assets.push({x: t.x, y: t.y, w: t.w, h: t.h, id: t.id, colour: t.colour});
				gameState = 1;
			}
			if (gameState == 2) {
				for (let p of players) {p.status = 0;}
				timeLimit = currTime + 5000;
			}
		}

			}

					p.w = p.h = Math.min(50,maxY/players.length/5);
					p.y = maxY*.8 - (maxY*.8 / (players.length+1) * (players.indexOf(p)+1));

				assets.push({x:0, w:maxX, y:0, h:maxY*.8, id:"mid", colour: "gold"});

				assets.push({x:maxX-players[0].w, w:players[0].w, y:0, h:maxY*.8, id:"late", colour: "red"});
				assets.push({x:maxX/2-players[0].w/2, w:players[0].w, y:0, h:maxY*.8, id:"money", colour: "green"});
				for (let p of players) {

					else {
						p.score -= temp.length;
						p.x = p.score/temp.length*(maxX-p.w) + (maxX/2-p.w/2);
						if (p.score < -temp.length/2) p.x = 0;
						else if (p.score > temp.length/2) p.x = maxX-p.w;
					}
					if (p.score != 0) {
						assets.push({text:p.score, x:p.x, w:p.w, y:p.y-p.h*.5, h:p.h, id:p.id, colour: "transparent", scale:.5});
						if (Math.abs(p.score) > temp.length/2) assets.at(-1).scale = .25;
					}
				}
				endDisplay();
			}
		}
	}

								temp = Math.floor(Math.random() * players.length);
								if (players[temp].status == 0) break;
							}
						}
						else {
							for (let j in players) {
								temp = (1*i + 1*j) % players.length;
								if (players[temp].status == 0) break;
							}
						}
						p.status = 0;
						players[temp].status = 1;
					}
					else p.score -= 5;
				}
				else if (i == temp) p.score -= fps/100;
				if (p.score <= 0) {
					p.status = "DEAD";
					timeLimit = currTime + 3000;
					gameState = 2;
				}
			}
			if (currTime >= timeLimit) {
				timeLimit = currTime + 3000;

				assets[0].text = `BOOM! ${players[temp].id} is out!`;

						if (players[temp].status == 0) break;
					}
				}
				else {

				}

	function dvdLogos() {
		if (gameState == 0) {
			temp = [];
			gameState = 1;
			for (let p of players) {p.x = 0; p.y = maxY/2; p.w = p.h = 50; p.ang = 0;}
		}
		if (gameState == 1) {
			assets = [{x: 0, y: maxY/2, w:maxX, h:0, id: "info", colour: "transparent"}];
			for (let p of players) {
				switch (p.status) {
					case 0: p.x += 10*(fps/17); break;
					case 1: p.x -= 10*(fps/17); break;
					case 2: p.y += 10*(fps/17); break;
					case 3: p.y -= 10*(fps/17); break;
					case 4: p.ang += 10*(fps/17); break;
					case 5: p.ang += 10*(fps/17); break;
					case 6: p.score += 1*(fps/17); break;
					case 7: p.score -= 1*(fps/17); break;
				}
				if (p.status < 8) {
					if (p.pressed == currTime) p.status += 2;
					if (p.x > maxX-p.w || p.y > maxY-p.h || p.score > p.h) p.status++;
					else if (p.x < 0 || p.y < 0 || p.score < 0) p.status--;
					if (p.status > 3) {
						assets.push({
							text:"↓", x:p.x+(p.h/2), y:p.y+(p.h/2), w:5, h:5, id: `ang${p.id}`, colour:"red", angle: p.ang
						});
					}
					if (p.status > 5) {
						assets.push({
							x:p.x-(p.h*.1), y:p.y+p.score, w:p.w*1.2, h:p.h*.1, id: `pow${p.id}`, colour:"red"
						});
					}
				}
				else {
					if (p.status < 10) {
						p.status = 10;
						let temp2 = [0,0];
						while (p.ang < 0) p.ang += 360;
						p.ang *= Math.PI/180;
						p.score = 10;
						temp2[0] = Math.cos(p.ang)*p.score;
						temp2[1] = Math.sin(p.ang)*p.score;
						p.score = [...temp2];
					}
					if (rando.checked) {
						for (let l of players) {
							if (l.id == p.id || l.status < 10) continue;
							if (simpleCollide(p,l)) {
								let temp2 = [Math.atan2(p.score[1], p.score[0]),Math.sqrt(p.score[0]**2 + p.score[1]**2)];
								let temp3 = [Math.atan2(l.score[1], l.score[0]),Math.sqrt(l.score[0]**2 + l.score[1]**2)];
								p.score[0] = temp2[1] * Math.cos(temp2[0] + Math.PI - temp3[0]);
								p.score[1] = temp2[1] * Math.sin(temp2[0] + Math.PI - temp3[0]);
								l.score[0] = temp3[1] * Math.cos(temp3[0] + Math.PI - temp2[0]);
								l.score[1] = temp3[1] * Math.sin(temp3[0] + Math.PI - temp2[0]);

							}
						}
					}
					p.x += p.score[0]*(fps/17);
					p.y += p.score[1]*(fps/17);
					let hitX = false, hitY = false;
					if (p.x > maxX - p.w || p.x < 0) {
						if (p.x > maxX - p.w) p.x = maxX - p.w;
						else p.x = 0;
						p.score[0] *= -1;
						if (rando.checked) p.score[0] += (Math.random()-.5)*10;
						hitX = true;
					}
					if (p.y > maxY - p.h || p.y < 0) {
						if (p.y > maxY - p.h) p.y = maxY - p.h;
						else p.y = 0;
						p.score[1] *= -1;
						if (rando.checked) p.score[1] += (Math.random()-.5)*10;
						hitY = true;
					}
					if (hitX && hitY) temp.push(p.id);
				}
			}
			if (temp.length > 0) {
				gameState = 2;
				assets = [{text:`Player ${temp.join(", ")} hit the corner`, x: 0, y: maxY/2, w:maxX, h:0, id: "info", colour: "transparent"}]
			}
		}
	}

			}
			gameState = 1;
		}
		if (gameState == 1) {
			assets[0].text = `Time remaining: ${Math.round((timeLimit-currTime)/1000)}`;
			for (let p of players) {
				if (p.status == "") p.status = p.remain.split("")[0];
				if (p.pressed == currTime) {
					temp2 = p.remain.split("");
					temp3 = temp2.indexOf(p.status);
					p.status = temp2[(temp3 + 1) % temp2.length];
				}
				assets[players.indexOf(p)+2].text = p.status;
				assets[players.indexOf(p)+2].w = p.w;
			}
			if (currTime > timeLimit) {
				timeLimit = currTime + 5000;
				temp[0]--;
				for (let p of players) {
					if (p.status == "P" && !p.score.includes("(")) {
						if (temp[0] == 6) p.score = "";
						else p.score = p.score.replace(temp[temp.length-temp[0]-2],"");
					}
					if (p.status == "P" && p.score.includes("(")) p.score += `)`;
					else p.score += `${p.status}${temp[temp.length-temp[0]-1]}`;
					p.remain = p.remain.replace(p.status,"");
					p.status = "";
					p.score = p.score.replace("P","(");
					p.score = p.score.replace("E","^");
					p.score = p.score.replace("M","*");
					p.score = p.score.replace("D","/");
					p.score = p.score.replace("A","+");
					p.score = p.score.replace("S","-");
					assets[players.indexOf(p)+2].text = p.score;
					assets[players.indexOf(p)+2].w = p.score.toString().length * 16 * Math.sqrt(1/players.length);
				}
				gameState = (temp[0] == 0) ? 3 : 2;
			}
		}
		if (gameState == 2) {
			assets[0].text = `Pause ${Math.round((timeLimit-currTime)/1000)}`;
			assets[1].text = `${temp.join(" ")}`;
			if (currTime > timeLimit) {
				if (rando.checked) {
					temp = [temp[0],":"];
					for (let i = 0; i < 7; i++) {temp.push(Math.round((Math.random()-.5)*10))}
					assets[1].text = `${temp.join(" ")}`;
				}
				timeLimit = currTime + 5000;
				gameState = 1;
			}
		}
		if (gameState == 3) {
			gameState = 4;
			for (let p of players) {
				p.score = p.score.replaceAll(/\^/g,"**");
				p.score = p.score.replaceAll(/--/g,"+");
				p.score = p.score.replaceAll(/\+-/g,"-");
				p.score = p.score.replace(/-(\d+)\s*\*\*/g, '(-$1)**');
				p.score = p.score.replace(/(-?\d)\s*\(/g, '$1*(');
				p.score = eval(p.score);
				assets[players.indexOf(p)+2].text = Math.round(p.score*1000)/1000;
				assets[players.indexOf(p)+2].w = (Math.round(p.score * 1000) / 1000).toString().length * 16 * Math.sqrt(1/players.length);
			}
			assets[0].text = `Player ${minMaxScore()[1]} scored the highest...	`;
			assets[1].text = `NERD!`;
		}
	}

			if (timeLimit < currTime) {
				assets[0].text = "";
				gameState = 2;
			}
		}
		if (gameState == 2) {
			for (let p of players) {
				if (p.pressed != 0) {
					p.y -= (p.y < maxY*.1) ? 0 : 1*ps.value*fps/17;
					assets.find(a => a.id === `${p.id}hand`).text = "✊";
					if (p.y+p.h >= p.loose && p.y > maxY*.1) {
						p.loose -= ((rando.checked) ? Math.random()*5 : 1*ps.value)*fps/17;
						p.score -= ((rando.checked) ? Math.random()*3 : .2*ps.value)*fps/17;
						if (Math.random() < (rando.checked ? 3*tc.value*fps/17 : 1*tc.value*fps/17)) {//chance to rip
							p.loose += Math.random()*(maxY*.9-40-p.loose);
						}
						if (p.score < 0) {
							gameState = 3;
							assets[0].text = `Player ${p.id} unrolled the fastest`;
						}
					}
				}
				else {
					p.y += (p.y > maxY*.85) ? 0 : 2*ps.value*fps/17;
					assets.find(a => a.id === `${p.id}hand`).text = "✋";
				}
				assets.find(a => a.id === `${p.id}hand`).y = p.y+p.h/2;
				assets.find(a => a.id === `${p.id}roll`).h = p.score/rs.value*p.w;
				assets.find(a => a.id === `${p.id}roll`).y = maxY*.9 + p.w-(p.score/rs.value*p.w);
				assets.find(a => a.id === `${p.id}loose`).y = p.loose;
				assets.find(a => a.id === `${p.id}loose`).h = maxY*.9-p.loose+p.w;
			}
		}
	}

	function hillClimbRacing() {
		if (gameState == 0) {
			gameState = 1;
			if (!options.innerHTML.includes("Fuel")) {
				options.innerHTML = `Player Size: <input type=range id=ps value=30 min=1 max=100>
				<br>Max Fuel: <input type=range id=mf value=1000 min=100 max=10000>
				<br>Hill Width: <input type=range id=hw value=5 min=1 max=50>
				<br>Hill Height: <input type=range id=hh value=10 min=1 max=50>
				<br>Laser Speed: <input type=range id=ls value=.8 min=0 max=5 step=.1>`;
			}
			temp = [{x:-100, w:20, y:maxY*.3, h:maxY*.7, id:`laser`, colour:"magenta"}];
			temp.push({x:300, w:20, y:maxY*.3, h:30, id:`gas`, colour:"red"});
			temp.push({x:0, w:300, y:0, h:maxY*.3, id:`hill${temp.length}`, colour:"green"});
			let temp2 = 300;
			let temp3 = maxY*.3;
			for (let p of players) {
				p.angle = -90;
				p.x = maxX*.25;
				p.y = maxY*.25;
				p.score = [1*mf.value,p.x, p.y];
				p.w = p.h = 1*ps.value;
			}
		}
		if (gameState == 1) {
			let alivePlayers = players.filter(p => p.status >= 0);
			if (alivePlayers.length <= 0) gameState = 2;
			let maxPX = Math.max(...alivePlayers.map(p => p.score[1] + p.w + maxX*.75));
			let minX = Math.min(...alivePlayers.map(p => p.score[1] - maxX*.25));
			let scale = (maxPX - minX) > 0 ? maxX / (maxPX - minX) : 1;
			console.log(scale)
			if (alivePlayers.length == 1) scale = 1;
			assets = [{text: Math.round((maxPX-maxX*.75-10*ps.value)/10), x: 0, y: maxY, w: maxX, h: 0, id: "score", colour: "transparent"}];
			while (temp[temp.length-1].x < maxPX*1.1) {
				temp.push({x:temp[temp.length-1].x + temp[temp.length-1].w*.95, w:Math.max(1,Math.random()*hw.value), y:0, 
					h:temp[temp.length-1].h + ((rando.checked) ? (Math.random()*100)-50 : (Math.random()*hh.value)-hh.value/2),
					id:`hill${temp.length}`, colour:"green"});
				if (temp[temp.length-1].h < 1) temp[temp.length-1].h = 1;
				else if (temp[temp.length-1].h > maxY*.9) temp[temp.length-1].h = maxY*.9;
			}
			if (temp[1].x < minX) temp[1].x = Math.max(Math.min(Math.random(), 0.9),.25) * maxX + minX;
			temp[0].x += 1*ls.value;
			for (let t of temp) {
				if (temp[1].y == 0 && t.id.includes("hill") && t.x <= temp[1].x && temp[1].x <= t.x + t.w) temp[1].y = t.h;
				if (t.id.includes("hill") && t.x <= temp[0].x+temp[0].w && temp[0].x+temp[0].w >= t.x + t.w) {
					temp[0].y = t.h;
					t.colour = "saddlebrown";	
				}
				let copy = {...t};
				assets.push(copy);
				assets[assets.length-1].x = (assets[assets.length-1].x - minX) * scale;
				assets[assets.length-1].w *= scale;
				assets[assets.length-1].h *= scale;
				assets[assets.length-1].y *= scale;
				if (t.id == "laser") assets[assets.length-1].h = maxY - assets[assets.length-1].y;
				if (assets[assets.length-1].x > maxX || assets[assets.length-1].x + assets[assets.length-1].w < 0) assets.pop();
			}
			for (let p of players) {
				if (p.status == "DEAD") continue;
				else if (p.status >= 0) {
					if (p.pressed != 0) {
						p.score[1] += (p.angle+90)/5;
						p.angle += 200*fps/1000;
						p.score[0] -= 5/(17/fps);
					}
					else p.angle -= 300*fps/1000;
					let temp2 = [];
					for (let a of assets) {
						if (a.id && a.id.includes("hill") && (p.x + p.w >= a.x && p.x <= a.x + a.w || simpleCollide(a,p))) temp2.push(a.h);
						else if (a.id && a.id == "gas" && simpleCollide(a,p)) {
							console.log("coliided")
							p.score[0] = 1*mf.value;
							if (p.score[0] > 1*mf.value) p.score[0] = 1*mf.value;
							temp[1].x = Math.max(Math.min(Math.random(), 0.9),.25) * maxX + minX;
							temp[1].y = 0;
						}
						else if (a.id && a.id.includes("laser") && simpleCollide(a,p)) p.status = -1;
					}
					p.score[2] = temp2.length > 0 ? (rando.checked ? temp2.reduce((a, b) => a + b, 0)/temp2.length : Math.max(...temp2)) : 0;
					if (p.y < p.score[2]) p.angle += (Math.atan2(p.score[2], p.w));
					if (p.angle > 0 || p.x < p.w*2 || p.score[0] < 0) p.status = -1;
					else if (p.angle < -90) p.angle = -90;
				}
				p.x = (p.score[1] - minX) * scale;
				p.y = p.score[2];
				p.w = scale * ps.value * 1;
				p.h = scale * ps.value;
				assets.push({x:p.x+p.w/2, y:p.y+(p.score[0]/mf.value*p.h), w:p.w, h:p.h*.1, id:`fuel${p.id}`, colour:"red"});
			}
		}
		if (gameState == 2) {
			gameState = 3;
			assets = [];
			for (let p of players) {
				p.status = 0;
				p.x = p.score[1];
				p.y = p.score[2];
				p.w = 1*ps.value * 1;
				p.h = 1*ps.value;
			}
			let maxPX = Math.max(...players.map(p => p.x));
			for (let t of temp) {
				if (t.x == null || t.x > maxX*.8 + maxPX) continue;
				if (t.x + t.w > maxX + maxPX) t.w = maxX - t.x;
				assets.push(t);
			}
			maxPX = Math.max(...players.map(p => p.x + p.w + maxX*.75));
			assets.push({text: Math.round((maxPX-maxX*.75-10*ps.value)/10), x: Math.max(...players.map(p => p.x))-maxX*.1, y: maxY, w:maxX, h:0, id: "score", colour: "transparent"});
			endDisplay();
		}
	}

	function simpleCollide(obj1, obj2) {
		return (
			obj1.x + obj1.w >= obj2.x &&
			obj1.x <= obj2.x + obj2.w &&
			obj1.y + obj1.h >= obj2.y &&
			obj1.y <= obj2.y + obj2.h
		);
	}

	function distanceCollide(obj1, obj2) {
		let dx = (obj1.x + obj1.w/2) - (obj2.x + obj2.w/2);
		let dy = (obj1.y + obj1.h/2) - (obj2.y + obj2.h/2);
		let threshold = Math.sqrt((obj1.w*obj1.h + obj2.w*obj2.h)/2)*.115;
		if (Math.sqrt(dx*dx + dy*dy) < (obj1.w + obj2.w)/threshold) return true;
	}

	function playSound(options = {}) {
		const {
			type = "sine",   // "sine", "square", "sawtooth", "triangle"
			frequency = 440, // min: 20, max: 20000 (Hz)
			gain = 0.15,     // min: 0, max: 1
			duration = 300,  // min: 1, max: 10000 (ms)
			detune = 0,      // min: -1200, max: 1200 (cents)
			attack = 0,      // min: 0, max: 5000 (ms)
			release = 0,     // min: 0, max: 5000 (ms)
			pan = 0          // min: -1 (left), max: 1 (right)
		} = options;
		const ctx = new (window.AudioContext || window.webkitAudioContext)();
		const osc = ctx.createOscillator();
		const gainNode = ctx.createGain();
		let panNode;
		if (ctx.createStereoPanner) {
			panNode = ctx.createStereoPanner();
			panNode.pan.value = pan;
		}
		osc.type = type;
		osc.frequency.value = frequency;
		osc.detune.value = detune;
		const now = ctx.currentTime;
		// Envelope
		gainNode.gain.setValueAtTime(0, now);
		gainNode.gain.linearRampToValueAtTime(gain, now + attack / 1000);
		gainNode.gain.setValueAtTime(gain, now + attack / 1000 + duration / 1000);
		gainNode.gain.linearRampToValueAtTime(0, now + attack / 1000 + duration / 1000 + release / 1000);
		if (panNode) osc.connect(gainNode).connect(panNode).connect(ctx.destination);
		else osc.connect(gainNode).connect(ctx.destination);
		osc.start(now);
		osc.stop(now + (attack + duration + release) / 1000);
		osc.onended = () => ctx.close();
	}

	async function playVoice(options = {}) {
		const {
			text = "Hello, world!",
			lang = "en-US",
			pitch = 1,
			rate = 1,
			volume = 1,
			voice = 13
		} = options;
		const synth = window.speechSynthesis;
		const utterance = new SpeechSynthesisUtterance(text);
		
		setTimeout(() => {
			utterance.pitch = pitch;
			utterance.rate = rate;
			utterance.volume = volume;
			utterance.lang = lang;
			utterance.voice = synth.getVoices()[voice];
			synth.speak(utterance);
		}, 50);
	}

	function minMaxScore() {
		let minScore = Infinity, maxScore = -Infinity;
		let minPlayers = [], maxPlayers = [];
		for (let p of players) {
			if (p.score < minScore) {
				minScore = p.score;
				minPlayers = [p.id];
			} else if (p.score === minScore) {
				minPlayers.push(p.id);
			}
			if (p.score > maxScore) {
				maxScore = p.score;
				maxPlayers = [p.id];
			} else if (p.score === maxScore) {
				maxPlayers.push(p.id);
			}
		}
		return [minPlayers, maxPlayers];
	}

	function displayPlayersTable(propertyName) {
		let tableHTML = '<table>';
		if (players && players.length < 0) return "No players data available.";
		let numCols = Math.floor(Math.sqrt(players.length));
		if (numCols > 4) numCols = 4;
		let cellsInRow = 0;
		tableHTML += '<tbody>';
		let pcount = 0;
		for (let p of players) {
			if (cellsInRow === 0) tableHTML += '<tr>';
			let propertyValue = p[propertyName];
			let cellStyle = `color: ${p.colour || '#ffffff'};`;
			if (p.status == "Dead") cellStyle += " background-color:red;";
			tableHTML += `<td style="${cellStyle}">Player ${p.id}: ${propertyValue}</td>`;
			cellsInRow++;
			if (cellsInRow === numCols || pcount === players.length - 1) {
				while (cellsInRow < numCols && pcount === players.length - 1) {
				   tableHTML += `<td></td>`; // Add empty cell
				   cellsInRow++;
				}
				tableHTML += '</tr>';
				cellsInRow = 0; // Reset cell counter for the next row
			}
			pcount++;
		}
		tableHTML += '</tbody></table>';
		return tableHTML;
	}

	function r2t2(e) {
		let result = "<table>";
		for (let i in e) {
			result += "<tr>";
			for (let j in e[i]) {result += `<td>${e[i][j]}</td>`;}
			result += "</tr>";
		}
		result += "</table>";
		return result;
	}

	function setPlayerAngles() {
		let alivePlayers = players.filter(p => p.status != "DEAD");
		for (let i = 0; i < alivePlayers.length; i++) {
			alivePlayers[i].angle = 360 * (i / alivePlayers.length);
			alivePlayers[i].angle0 = alivePlayers[i].angle; // Add this line
		}
	}

	function setPlayerGrid(r,c,mX,mY,xX,xY) {
		let alivePlayers = players.filter(p => p.status != "DEAD");
		if (r < 0 && c < 0) {
			r = Math.ceil(Math.sqrt(alivePlayers.length));
			c = Math.ceil(alivePlayers.length / r);
		} else if (r < 0) {
			r = Math.ceil(alivePlayers.length / c);
		} else if (c < 0) {
			c = Math.ceil(alivePlayers.length / r);
		}
		let cellWidth = xX / c;
		let cellHeight = xY / r;
		let playerIndex = 0;
		for (let i = 0; i < r; i++) {
			for (let j = 0; j < c; j++) {
				if (playerIndex >= alivePlayers.length) return;
				let x = j * cellWidth + mX;
				let y = i * cellHeight + mY;
				alivePlayers[playerIndex].x = x + cellWidth / 2;
				alivePlayers[playerIndex].y = y + cellHeight / 2;
				playerIndex++;
			}
		}
	}

		if (displayType == "HTML") {

						opacity: ${p.status < 0 ? 0.25 : 1}; font-size: ${Math.min(p.w, p.h)}px;'>${p.id}</div>`;
			}
			if (assets.length != 0) {
				for (let [i,a] of assets.entries()) {
					game += `<div style='position: absolute; bottom: ${a.y}px; left: ${a.x}px; color: ${(a.fcolour) ? a.fcolour : ""};

						 transform: rotate(${(a.angle != null) ? (-90-a.angle) : 0}deg)
						 scale(${(a.scale) ? a.scale : 1}) translate(${(a.tX) ? a.tX : 0}px, ${(a.tY) ? a.tY : 0}px);
						 text-wrap: nowrap;'>${(a.text != null) ? a.text : ''}</div>`;
				}
			}
			game += "</div>";
			gZone.innerHTML = game;
			return;
		}
		else if (displayType == "Canvas") {
			gZone._cssInitialized = false;
			if (!canvas || !gZone.contains(canvas)) {
				gZone.innerHTML = "";
				canvas = document.createElement("canvas");
				gZone.appendChild(canvas);
				document.querySelector("canvas").setAttribute("id", "canvas");
			}
			canvas.width = maxX;
			canvas.height = maxY;
			canvas.style.width = maxX + "px";
			canvas.style.height = maxY + "px";
			ctx = canvas.getContext("2d");
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			for (let a of assets) {
				ctx.fillStyle = a.colour;
				ctx.save();
				if (a.angle != null || a.scale != null || a.tX != null || a.tY != null) {
					ctx.translate(
						a.x + a.w / 2 + (a.tX || 0),
						canvas.height * (1 - a.y / maxY) - a.h / 2 + (a.tY || 0)
					);
					if (a.angle != null) {
						ctx.rotate((-90 - a.angle) * Math.PI / 180);
					}
					if (a.scale != null) {
						ctx.scale(a.scale, a.scale);
					}
					ctx.translate(-a.w / 2, -a.h / 2);
				} else {
					ctx.translate(a.x, canvas.height * (1 - a.y / maxY) - a.h);
				}
				ctx.globalAlpha = (a.opacity) ? a.opacity : 1;
				ctx.fillRect(0, 0, a.w, a.h);
				if (a.text != null) {
					ctx.fillStyle = "rgb(200,200,200)";
					ctx.font = `5rem Times New Roman`;
					let text = ctx.measureText(a.text);
					ctx.fillText(a.text, (a.w - text.width) / 2, text.actualBoundingBoxAscent + a.h / 2);
				}
				ctx.restore();
			}
			for (let p of players) {
				if (p.status == "DEAD") continue;
				ctx.fillStyle = p.colour;
				ctx.save();
				ctx.fillStyle = p.colour;
				ctx.globalAlpha = (p.status < 0) ? 0.25 : 1;
				if (p.angle != null) {
					ctx.translate(p.x + p.w / 2, canvas.height * (1 - p.y / maxY) - p.h / 2);
					ctx.rotate((-90 - p.angle) * Math.PI / 180);
					ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
				} else {
					ctx.fillRect(p.x, canvas.height * (1 - p.y / maxY) - p.h, p.w, p.h);
				}
				if (p.id != null) {
					ctx.fillStyle = "rgb(200,200,200)";
					ctx.font = `${Math.min(p.w, p.h)}px Times New Roman`;
					let text = ctx.measureText(p.id);
					ctx.fillText(
						p.id,
						(p.angle != null ? -p.w / 2 : p.x) + (p.w - text.width) / 2,
						(p.angle != null ? text.actualBoundingBoxAscent : canvas.height * (1 - p.y / maxY) - p.h / 2) + text.actualBoundingBoxAscent / 2
					);
				}
				ctx.restore();
			}
			return;
		}
		else if (displayType == "CSS") {
			if (!gZone._cssInitialized) {
				gZone._cssInitialized = true;
				gZone.innerHTML = "<div class=game style='width: ${maxX}px; height: ${maxY}px;'></div>";
			}
			gZone.firstChild.style.width = maxX + "px";
			gZone.firstChild.style.height = maxY + "px";
			let playerIds = players.map(p => `p${p.id}`);
			let existingPlayerDivs = Array.from(gZone.firstChild.querySelectorAll('[id^="p"]'));
			for (let div of existingPlayerDivs) {
				if (!playerIds.includes(div.id)) div.remove();
			}
			for (let [i,p] of players.entries()) {
				let playerDiv = document.getElementById(`p${p.id}`);
				if (!playerDiv) {
					gZone.firstChild.innerHTML += `<div id=p${p.id} style='position: absolute; z-index: ${i};'>${p.id}</div>`;
					playerDiv = document.getElementById(`p${p.id}`);
					playerDiv.style.zIndex = i + 1;
				}
				if (p.status == "DEAD") playerDiv.style.display = "none";
				else playerDiv.style.display = "";
				playerDiv.style.background = p.colour;
				playerDiv.style.width = p.w + "px";
				playerDiv.style.height = p.h + "px";
				playerDiv.style.left = p.x + "px";
				playerDiv.style.bottom = p.y + "px";
				playerDiv.style.transform = `rotate(${(p.angle != null) ? (-90-p.angle) : 0}deg)`;
				playerDiv.style.opacity = (p.status < 0) ? 0.25 : 1;
				playerDiv.style.fontSize = Math.min(p.w, p.h) + "px";
			}
			let assetIds = assets.map(a => `a${a.id}`);
			let existingAssetDivs = Array.from(gZone.firstChild.querySelectorAll('[id^="a"]'));
			for (let div of existingAssetDivs) {
				if (!assetIds.includes(div.id)) div.remove();
			}
			for (let a of assets) {
				let assetDiv = document.getElementById(`a${a.id}`);
				if (!assetDiv) {
					gZone.firstChild.innerHTML += `<div id=a${a.id} style='position: absolute;'>${(a.text) ? a.text : ''}</div>`;
					assetDiv = document.getElementById(`a${a.id}`);
				}
				assetDiv.style.background = a.colour;
				assetDiv.style.color = (a.fcolour) ? a.fcolour : "";
				assetDiv.style.bottom = a.y + "px";
				assetDiv.style.left = a.x + "px";
				assetDiv.style.width = a.w + "px";
				assetDiv.style.height = a.h + "px";
				assetDiv.style.opacity = (a.opacity) ? a.opacity : 1;
				assetDiv.style.transform = `rotate(${(a.angle != null) ? (-90-a.angle) : 0}deg) 
					scale(${(a.scale) ? a.scale : 1}) translate(${(a.tX) ? a.tX : 0}px, ${(a.tY) ? a.tY : 0}px)`;
				assetDiv.innerHTML = (a.text) ? a.text : '';
				assetDiv.style.textWrap = "nowrap";
			}
		}
		else {return "No players data available.";}
	}

	function makeImage() {
		let tempcanvas = document.createElement('canvas');
		tempcanvas.width = maxX;
		tempcanvas.height = maxY;
		let ctx = tempcanvas.getContext('2d');
		let minX = Infinity, minY = Infinity, maxXc = -Infinity, maxYc = -Infinity;
		for (let p of players) {
			if (p.x < minX) minX = p.x;
			if (p.y < minY) minY = p.y;
			if (p.x + p.w > maxXc) maxXc = p.x + p.w;
			if (p.y + p.h > maxYc) maxYc = p.y + p.h;
		}
		for (let a of assets) {
			if (a.x < minX) minX = a.x;
			if (a.y < minY) minY = a.y;
			if (a.x + a.w > maxXc) maxXc = a.x + a.w;
			if (a.y + a.h > maxYc) maxYc = a.y + a.h;
		}
		if (!isFinite(minX)) {minX = 0; maxXc = tempcanvas.width;}
		else tempcanvas.width = maxXc - minX;
		if (!isFinite(minY)) {minY = 0; maxYc = tempcanvas.height;}
		else tempcanvas.height = maxYc - minY;
		let scale = Math.min(tempcanvas.width / (maxXc - minX), tempcanvas.height / (maxYc - minY));
		for (let a of assets) {
			ctx.save();
			let tx = (a.x - minX) * scale + (a.tX || 0);
			let ty = tempcanvas.height - ((a.y - minY + a.h) * scale) + (a.tY || 0);
			ctx.translate(tx + (a.w * scale) / 2, ty + (a.h * scale) / 2);
			if (a.angle != null) {
				ctx.rotate((-90 - a.angle) * Math.PI / 180);
			}
			if (a.scale != null) {
				ctx.scale(a.scale, a.scale);
			}
			ctx.translate(-(a.w * scale) / 2, -(a.h * scale) / 2);

			ctx.fillStyle = a.colour;
			ctx.fillRect(0, 0, a.w * scale, a.h * scale);

		 if (a.text != null) {
				ctx.fillStyle = "rgb(200,200,200)";
				ctx.font = `5rem Times New Roman`;
				let text = ctx.measureText(a.text);
				ctx.fillText(
					a.text,
					(a.w * scale - text.width) / 2,
					(a.h * scale) * 0.75 + text.actualBoundingBoxAscent
				);
			}
			ctx.restore();
		}
		for (let p of players) {
			ctx.fillStyle = p.colour;
			ctx.fillRect((p.x-minX) * scale,tempcanvas.height - ((p.y-minY+p.h) * scale),p.w * scale,p.h * scale);
			ctx.fillStyle = "rgb(200,200,200)";
			ctx.font = `${Math.min(p.w, p.h)}px Times New Roman`;
			let text = ctx.measureText(p.id);
			ctx.fillText(p.id, (p.x-minX) * scale + (p.w*scale-text.width)/2, tempcanvas.height - ((p.y-minY+p.h*.75) * scale) + text.actualBoundingBoxAscent);
		}
		const originalWidth = tempcanvas.width;
		const originalHeight = tempcanvas.height;
		const extra = 2; // thickness of the line
		const newHeight = originalHeight + 2 * extra;
		const imgData = ctx.getImageData(0, 0, originalWidth, originalHeight);
		tempcanvas.height = newHeight;
		ctx.putImageData(imgData, 0, extra);
		ctx.strokeStyle = "#fff";
		ctx.lineWidth = extra;
		ctx.beginPath();
		ctx.moveTo(0, extra / 2);
		ctx.lineTo(tempcanvas.width, extra / 2);
		ctx.stroke();
		ctx.beginPath();
		ctx.moveTo(0, tempcanvas.height - extra / 2);
		ctx.lineTo(tempcanvas.width, tempcanvas.height - extra / 2);
		ctx.stroke();
		return tempcanvas.toDataURL();
	}

	function endDisplay() {
		pause = true;
		if (!canvas || !gZone.contains(canvas)) {
			gZone.innerHTML = "";
			canvas = document.createElement("canvas");
			gZone.appendChild(canvas);
			document.querySelector("canvas").setAttribute("id", "canvas");
		}
		canvas.width = maxX;
		canvas.height = maxY;
		canvas.style.width = maxX + "px";
		canvas.style.height = maxY + "px";
		ctx = canvas.getContext("2d");

		const img = new Image();
		img.src = `${makeImage()}`;

		let scale = 1, originX = 0, originY = 0, isDragging = false, startX, startY;

		function draw() {
			ctx.setTransform(scale, 0, 0, scale, originX, originY);
			ctx.clearRect(-originX / scale, -originY / scale, canvas.width / scale, canvas.height / scale);
			ctx.drawImage(img, 0, 0);
		}

		img.onload = function() {
			// Set scale to fit image to canvas
			originX = canvas.width - img.width;
			originY = 0;
			draw();
		};

		canvas.onwheel = e => {
			e.preventDefault();
			const zoom = e.deltaY < 0 ? 1.1 : 0.9;
			const mx = e.offsetX, my = e.offsetY;
			originX = mx - (mx - originX) * zoom;
			originY = my - (my - originY) * zoom;
			scale *= zoom;
			draw();
		};

		canvas.onmousedown = e => {
			isDragging = true;
			startX = e.clientX - originX;
			startY = e.clientY - originY;
			canvas.style.cursor = 'grabbing';
		};

		canvas.onmouseup = () => {
			isDragging = false;
			canvas.style.cursor = 'grab';
		};

		canvas.onmousemove = e => {
			if (!isDragging) return;
			originX = e.clientX - startX;
			originY = e.clientY - startY;
			draw();
		};

		window.onresize = () => {
			canvas.width = maxX;
			canvas.height = maxY;
			scale = Math.min(canvas.width / img.width, canvas.height / img.height);
			draw();
		};
	}

	function rollCredits() {
		pause = true;
		opts.style.display = "none";
		if (gameState > 0) return;
		gameState = 1;
		header.innerHTML = "";
		sZone.innerHTML = "";
		main.innerHTML = "";
		gZone.innerHTML = `
